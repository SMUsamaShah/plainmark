<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Plainmark</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="header">
    <span id="title" title=""></span>
    <button id="settingsBtn" title="Open settings">&#9881;</button>
  </div>

  <input type="text" id="note" placeholder="Add a note (optional)">

  <div id="footer">
    <span id="status"></span>
    <div id="actions">
      <button id="deleteBtn" style="display:none">Delete</button>
      <button id="closeBtn">Close</button>
      <span id="endpoint-label"></span>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
